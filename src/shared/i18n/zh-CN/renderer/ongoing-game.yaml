    loadedDetailedSamples: '{{count}} 场详细对局样本'
    loadedJungleSamples: '{{count}} 场为打野对局'
    algorithmDetails: 算法说明
    algorithmDetailZoneWeight: '{zoneWeight} = Σ{positionWeight} + Σ{takedownWeight}。{positionWeight}：{first14Minutes}每个整分钟按打野所在上 / 中 / 下分区 {pointOne}。{takedownWeight}：14 分钟内每次击杀参与按击杀位置分区 {pointFive}。'
    algorithmDetailPreference: '{preferenceDecision}：中 + 下权重占比 ≥ 70% 且上权重占比 ≤ 28% 判为 {midBot}。上 + 中权重占比 ≥ 70% 且下权重占比 ≤ 28% 判为 {topMid}。{singleZone}权重占比 ≥ 40% 且领先第二高分区 ≥ 8 个百分点，判为偏上 / 偏中 / 偏下。其余判为 {balanced}。'
    algorithmDetailFirstClear: '{firstClearDecision}：取 {oneMinutePosition} 最近的野怪营地。若该营地位于对方半区，则计为 {invadeStart}。'
    algorithmDetailLevel3Gank: '{level3Decision}：{threeMinuteFrame}补刀数（小兵 + 野怪）为 {csRange}，等级为 {level3}，且检测到 {championDamage}。无详细伤害数据时，用 3 分钟内{takedownParticipation}替代英雄伤害条件。'
    algorithmDetailLevel4Gank: '{level4Decision}：{fourMinuteFrame}相较 3 分钟帧检测到{championDamageIncrease}，或 3-4 分钟内存在{takedownParticipation}。无详细伤害数据时，仅使用{takedownParticipation}判定。'
    algorithmDetailAggregation: '{aggregation}：当前标签页限定{sampleScope}（当前英雄或全部）。首清与前期抓人按{blueRedSide}分别累计。'
