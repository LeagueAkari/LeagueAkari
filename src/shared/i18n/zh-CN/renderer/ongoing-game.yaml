    mapSemanticDescription: 圆点表示前 14 分钟整分钟位置样本。叉号表示 14 分钟内击杀参与位置。小地图点位可能经过抽样，精确数值以分区权重为准。
    algorithmSummaryZoneWeight: 分区权重用于衡量前 14 分钟上 / 中 / 下半区活动强度。
    algorithmSummaryPathing: 首清与前期抓人按当前样本范围统计，并区分蓝色方 / 红色方。
