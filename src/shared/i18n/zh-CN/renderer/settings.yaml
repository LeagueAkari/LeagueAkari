        positiveText: 卸载
        negativeText: 取消
  matchHistory:
    title: 战绩页面
    refreshTabsAfterGameEnds:
      label: 更新页面战绩
      description: 在对局结束后，主动刷新所有涉及到本次对局的战绩页面。由于服务器的更新延迟，获取到的战绩仍可能非最新
