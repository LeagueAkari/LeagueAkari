        button: 断开
      quitClient:
        label: 关闭客户端进程
        description: 关闭 League Client
        button: 关闭 Client 进程
        dialog:
          title: 退出客户端进程
          content: 是否退出客户端进程？这将直接关闭游戏。
          positiveText: 退出
          negativeText: 取消
    gameClient:
      title: 游戏端
      windowsOnlyNativeAddon: 需要原生插件（本构建目前仅在 Windows 提供）。
      nativeAddonRequiresAdministrator: 当前平台支持该能力，但需要以管理员权限运行。
      terminateGameClientWithShortcut:
        labelAdminRequired: 使用快捷键结束游戏端 (需要管理员权限)
        label: 启用结束游戏端快捷键
        description: 当游戏端正在运行且在前台时，使用快捷键可强制结束游戏端 (游戏本体) 进程。请注意，此操作为强制结束进程，而非正常的游戏退出流程，可能产生意料之外的副作用
      terminateShortcut:
        label: 结束游戏端快捷键
        labelAdminRequired: 结束游戏端快捷键 (需要管理员权限)
        description: 设置快捷键
      settingsFileMode:
        label: 锁定游戏设置
        description: 防止游戏内改动覆盖你已经调好的设置。需要调整设置时，可临时解除锁定
        details:
          readonly: 锁定后，League Akari 会把英雄联盟的设置文件设为只读。游戏仍会读取现有设置，但新的改动不会写回。
          writable: 解除锁定会恢复写入。之后在游戏内调整画质、热键等设置时，会正常保存。
          scope: 只影响当前连接的客户端安装目录。
        setToReadonly: 已锁定游戏设置
        setToWritable: 已解除游戏设置锁定
        failedToSet: 切换锁定状态失败 {{reason}}
    leagueClientUx:
      title: League Client UX
      fixWindowMethodAOptions:
        label: 调整窗口大小
        labelAdminRequired: 调整窗口大小 (需要管理员权限)
        description: <a target="_blank" href="https://github.com/LeagueTavern/fix-lcu-window">FixLCUWindow</a> - 以 WinAPI 方式调整窗口的大小。在客户端界面大小不正确时，可尝试此操作
        unsupportedCurrentPlatform: 当前平台不支持调整窗口大小。
        requiresAdministrator: 当前平台支持调整窗口大小，但需要以管理员权限运行。
        button: 调整
        dialog:
          title: 调整窗口大小
          content: 是否调整窗口大小？当客户端无法正常显示时，可尝试执行此操作。
          positiveText: 调整
          negativeText: 取消
      restartUx:
        label: 重启客户端界面
        description: 立即重启渲染进程。该操作不会影响正在进行中的活动，适用于修复客户端界面错误
        button: 重启 UX 进程
        dialog:
          title: 重启 UX 进程
          content: 是否重启 UX 进程？当客户端无法正常显示时，可尝试执行此操作。
          positiveText: 重启
          negativeText: 取消
      killUx:
        label: 结束 UX 进程
        description: 立即关闭渲染进程。该操作不会影响正在进行中的活动
        button: 结束 UX 进程
        dialog:
          title: 结束 UX 进程
          content: 是否结束 UX 进程？你可能需要重新启动此进程。结束 UX 进程并不会导致游戏退出，但可以显著减少性能占用。
          positiveText: 结束
          negativeText: 取消
      launchUx:
        label: 启动 UX 进程
        description: 如果渲染进程已经关闭，则立即启动渲染进程
        button: 启动 UX 进程
        dialog:
          title: 启动 UX 进程
          content: 是否启动 UX 进程？
          positiveText: 启动
          negativeText: 取消
