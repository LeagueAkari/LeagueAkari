      # $t(common:appName) 用户须知与免责声明

      > **请在下载、安装或使用本软件之前，务必仔细阅读并充分理解本须知与免责声明。**
      > 一旦您开始使用，即视为已充分理解并同意下列全部条款。

      ---

      ## 一、软件性质与获取途径
      - **$t(common:appName)** 为完全开源、免费之软件，所有功能均以「按现状」方式公开提供。
      - 本软件并未以**任何**方式公开售卖，如遇倒卖、捆绑销售或其他牟利形式，请勿购买，若购买请**立即退款**。

      ## 二、风险提示与责任限制
      - 使用本软件**可能**导致（包括但不限于）：
        1. 游戏账户被暂停或永久封禁；
        2. 游戏数据丢失、损坏或与服务器数据不一致；
        3. 客户端异常、性能下降或其他不良游戏体验。
      - 对因使用或无法使用本软件所引发的任何直接、间接、偶然、特殊或后续损失，**$t(common:appName)** 开发团队及全部贡献者概不承担任何责任，相关风险由用户自行承担。

      > 请参考 [Patch 25.17 更新说明](https://www.leagueoflegends.com/en-us/news/game-updates/patch-25-17-notes/) 中的 **Game Info Tracking Improvements** 一节。

      ## 三、服务器兼容性声明
      - **自本声明发布之日起，$t(common:appName) 不再对腾讯游戏服务器提供任何形式的支持。**
      - 在腾讯服务器环境中使用本软件**极有可能**违反腾讯游戏相关用户协议、管理规范或技术保护措施；由此产生的封号、数据丢失或其他不利后果，概由用户自行负责。

      ## 四、信息收集与隐私保护
      - 为改进产品质量、分析错误及进行安全统计，软件运行时将收集**必要且有限**的系统信息与崩溃日志。
      - 所收集信息**不含**可识别个人身份之数据，不会上传至任何第三方服务器，亦不会用于商业用途。

      ## 五、其他事项
      - 连续使用右键点击三次确认按钮，可快速关闭这个页面，同时视为您已经阅读并同意本须知与免责声明。

      ---

      > **如您对本须知与免责声明存在任何疑问，或需要进一步了解软件详情，请访问**
      > <https://github.com/LeagueAkari/LeagueAkari> 。

