    # $t(common:appName) User Guide & Disclaimer

    > **Before downloading, installing, or using this software, please read and fully understand this guide and disclaimer.**
    > Once you start using it, you are deemed to have fully understood and agreed to all the following terms.

    ---

    ## I. Nature of the Software & Acquisition
    - **$t(common:appName)i** is entirely open-source and free; all features are provided “as-is.”
    - This software is not sold in any form of paid, bundled, or profit-making manner. If you encounter any form of reselling, bundling, or other profit-making activities, please do not purchase it. If you purchase it, please **immediately refund**.

    ## II. Risk Notice & Limitation of Liability
    - Using this software **may** result in (including but not limited to):
      1. Your game account being suspended or permanently banned;
      2. Loss, corruption, or inconsistency of game data with server data;
      3. Client crashes, performance degradation, or other poor game experiences.
    - For any direct, indirect, incidental, special, or consequential damages arising from using or being unable to use this software, the **$t(common:appName)** development team and all contributors assume no liability; all related risks are borne by the user.

    > Please refer to the **Game Info Tracking Improvements** section in [Patch 25.17 Notes](https://www.leagueoflegends.com/en-us/news/game-updates/patch-25-17-notes/).

    ## III. Server Compatibility Statement
    - **Effective from the release of this statement, $t(common:appName) will no longer provide any form of support for Tencent Game servers.**
    - Using this software in Tencent server environments is highly likely to violate Tencent Games’ user agreements, management regulations, or technical protection measures; any account bans, data loss, or other adverse consequences are solely the user’s responsibility.

    ## IV. Information Collection & Privacy Protection
    - To improve product quality, analyze errors, and conduct security statistics, the software collects **necessary and limited** system information and crash logs during operation.
    - The collected information **does not** contain personally identifiable data, will not be uploaded to any third-party server, and will not be used for commercial purposes.

    ## V. Other
    - Clicking the confirm button three times in a row, can quickly close this modal. By doing this, it is deemed that you have read and agreed to this guide and disclaimer.

    ---

    > **If you have any questions about this guide and disclaimer, or need further information about the software, please visit**
    > <https://github.com/LeagueAkari/LeagueAkari> .

    </div>

