  algorithmDetailPreference: '{preferenceDecision}: mid + bot share ≥ 70% and top share ≤ 28% means {midBot}. Top + mid share ≥ 70% and bot share ≤ 28% means {topMid}. {singleZone} share ≥ 40% and at least 8 percentage points ahead of the second-highest zone means Top / Mid / Bot. Otherwise {balanced}.'
  algorithmDetailFirstClear: '{firstClearDecision}: use the nearest jungle camp to the {oneMinutePosition}. If the camp is in the enemy half, it is counted as an {invadeStart}.'
  algorithmDetailLevel3Gank: '{level3Decision}: at the {threeMinuteFrame}, CS (minion + jungle) is {csRange}, level is {level3}, and {championDamage} is detected. Without detailed damage data, {takedownParticipation} within 3 minutes is used as the damage condition.'
  algorithmDetailLevel4Gank: '{level4Decision}: by the {fourMinuteFrame}, {championDamageIncrease} is detected compared with the 3-minute frame, or {takedownParticipation} occurred from 3-4 minutes. Without detailed damage data, only {takedownParticipation} is used.'
  algorithmDetailAggregation: '{aggregation}: the active tab defines the {sampleScope} (current champion or all). First clear / early ganks are accumulated separately for {blueRedSide}.'
