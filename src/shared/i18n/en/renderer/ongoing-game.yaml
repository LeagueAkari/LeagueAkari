    mapSemanticDescription: Dots are minute-frame position samples from the first 14 minutes. Crosses are takedown-participation positions within 14 minutes. Mini-map points may be sampled; use Zone Weight for exact values.
    algorithmSummaryZoneWeight: Zone Weight measures top / mid / bot activity intensity during the first 14 minutes.
    algorithmSummaryPathing: First clear and early ganks are aggregated within the current sample scope and split by blue / red side.
    loadedSamples: Loaded {{details}} for this player, including {{jungle}}.
    loadedDetailedSamples_one: '{{count}} detailed match sample'
    loadedDetailedSamples_other: '{{count}} detailed match samples'
