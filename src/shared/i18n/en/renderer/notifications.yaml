notifications:
  updateModal:
    newVersion: New Version
    versionFeatures: Version Features
    newVersionAvailable: 'New version available: {{version}} (Current version: {{currentVersion}})'
    currentVersion: 'Current Version: {{version}}'
    releasePage: Release Page
    startUpdate: Start Update
    downloading: Downloading {{progress}}%
    unpacking: Unpacking {{progress}}%
    waitingForRestart: Update on Close
    downloadFailed: Download Failed
    externalDownload: External Download
    noUpdateMd: No release notes
    ignoreThisVersion: Ignore This Version
    noUpdate: No updates
  simple:
    newReleaseHints:
      title: New Version Available
      content: New version {{version}} is available
      takeALook: Take a Look
      dismiss: Dismiss
    liveStreamingHints:
      dismiss: Dismiss
      neverShowAgain: Never Show Again
      toSettings: To Settings
      detected:
        title: Are you live streaming?
        liveTools: $t(common:appName) has detected one or more live streaming tools running. You can enable Streamer Mode to hide sensitive information
        bySettings: $t(common:appName) has detected that the league client live streaming mode is enabled. You can enable live streaming mode to hide sensitive information
    login-queue-task:
      name: Login Queue
      description: 'Queueing: {{position}} / {{maxPosition}} (estimated {{waitTime}})'
    higherVersionDb:
      title: Detected higher version database
      content: The database version in use is higher than this application supports. Please update $t(common:appName) to the latest version for best compatibility
      positiveText: View Update
    badSgpConnection:
      title: Poor SGP Data Source Network Connection
      content:
        usingSgp: Currently using SGP data source, but poor network connection quality has been detected, which may affect data retrieval and functionality.
        recommendation: It is recommended to go to "Settings → $t(settings.app.title) → $t(settings.app.basic.title) → $t(settings.app.basic.preferredLolSource.label)" and change the data source to LCU for a more stable experience.
        vpnReason: This may be caused by network instability when using VPN to access cross-region servers.
      positiveText: Go to Settings
      negativeText: Dismiss
      neverShowAgain: Do Not Remind Again
    replay-download-progress-task:
      name: Replay Download
      checking: Checking replay metadata...
      found: Found replay metadata
      downloading: Downloading replay...
      watch: Replay downloaded
      incompatible: Replay incompatible
      closeButton: Close
      watchButton: Watch Replay
    wmiRequiresAdministrator:
      title: Requires Administrator
      content: Current use WMI to get league client command line, requires running this application with administrator privileges
      positiveText: Restart with Administrator privileges
      negativeText: Cancel
    cannotGetUxCommandLine:
      title: Cannot Get League Client UX Command Line
      alreadyUseWmi: Detected League Client UX is running, but cannot get its command line information. It may be that $t(common:appName) cannot be used on this computer
      noAdminContent: Detected League Client UX is running, but cannot get its command line information. Please try to restart this application with administrator privileges, then enable or disable "Use WMI to get command line" in settings to try to solve the problem. If the connection continues to be unavailable, please feedback this issue to the development team
      withAdminContent: Detected League Client UX is running, but cannot get its command line information. Please try to enable or disable "Use WMI to get command line" in settings to try to solve the problem. If the connection continues to be unavailable, please feedback this issue to the development team
      extraContent: 'Please note: In some streamlined systems or internet café environments, due to certain restrictions, $t(common:appName) may not work properly'
      withAdminPositiveText: Confirm
      noAdminPositiveText: Restart with Administrator privileges
    autoReconnect:
      title: Auto Reconnect
      content: Will reconnect in {{timeLeft}}.
    runInTempDirWarning:
      title: Run in Temp Dir Warning
      content: The application is running in the temp directory, which may cause security issues. This may be because the application is not located in the correct installation location, or not properly unzipped.
      negativeText: Dismiss
    updateDownloadFailed:
      title: Update Download Failed
      content: 'Failed to download update: {{error}}. Please check your network connection, or check the announcement for more information to get possible solutions.'
      positiveText: Check Announcement
      negativeText: Dismiss
selfUpdate:
  tasks:
    self-update-task:
      name: $t(common:appName) Update
      downloading: Downloading archive {{progress}}% ({{avgSpeed}}/s, eta {{eta}})
      download-failed: Failed to download archive
      waiting-for-restart: Update package downloaded. Close the application to apply the update
      cancelButton: Cancel
      closeButton: Close and Update
    title: Self Update
    start-update: Starting update $t(common:appName)
    updateOnQuit: Updated Applied. Restart the application to apply the update
    lastUpdateFailed: The last update failed, please check the logs and try to download the latest version from the official repository
    lastUpdateSuccess: Updated to {{version}}
