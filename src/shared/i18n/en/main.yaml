  exampleTemplate: |
    // Define the metadata of the template
    function getMetadata() {
      return {
        version: 10,
        type: 'ongoing-game'
      }
    }

    // Define the messages of the template
    function getMessages(env) {
      return [
        'Message 1',
        'Message 2',
        'Message 3',
        'Message 4',
        'Message 5'
      ]
    }

  templateTypes:
    ongoing-game: Ongoing Game Template
