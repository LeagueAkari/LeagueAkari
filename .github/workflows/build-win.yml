name: Build Windows
on:
  push:
    branches: [ main, macos-port ]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build-win:
    runs-on: windows-latest
    env:
      # Private packages under @leagueakari/@leaguetavern require NODE_AUTH_TOKEN.
      NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: yarn.lock
      
      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Windows
        run: yarn build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.7z
            dist/*.exe
          retention-days: 5
