name: Build macOS
on:
  push:
    branches: [ main, sky-dev ]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      # Private packages under @leagueakari/@leaguetavern require NODE_AUTH_TOKEN.
      NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Cache Electron Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('yarn.lock', 'package.json', 'electron-builder.yml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build macOS
        run: yarn build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 1
