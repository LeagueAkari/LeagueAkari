name: Build macOS
on:
  push:
    branches: [ main, sky-dev ]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      # Private packages under @leagueakari/@leaguetavern require NODE_AUTH_TOKEN.
      NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Cache Electron Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('yarn.lock', 'package.json', 'electron-builder.yml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build macOS
        run: yarn build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.sha }}
          name: CI Build ${{ github.ref_name }} @ ${{ github.sha }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          generate_release_notes: false
          overwrite_files: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          fail_on_unmatched_files: true
